<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Morrow Hotel Booking</title>

  <!-- Global CSS: used by all pages -->
 
 <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body class="{% block body_class %}{% endblock %}">

  <!-- Header / Main Navigation -->

  <header>
    <h1>Morrow Hotel Booking</h1>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('nav').classList.toggle('open')">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <nav>
      <!-- Always visible -->
      <a href="/">Home</a>

      {% set user = request.session.get("user") %}

      {% if user %}
        <span class="nav-welcome">Welcome {{ user.user_name or user.email }}</span>
      {% endif %}

      {% if user %}
        <!-- User is logged in -->
        <a href="/my-bookings">My Bookings</a>

        {% if user.is_admin %}
          <!-- Admin-only -->
          <a href="/admin">Admin</a>
        {% endif %}

        <a href="/logout">Logout</a>

      {% else %}
        <!-- User is NOT logged in -->
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      {% endif %}
    </nav>
    <script>
      // Close menu when navigation link is clicked
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('nav a').forEach(function(link) {
          link.addEventListener('click', function() {
            document.querySelector('nav').classList.remove('open');
          });
        });
      });
    </script>
  </header>

  <!--Page Content Area-->
  <main>
    {% block content %}
    {% endblock %}
  </main>

</body>
</html>
