<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Morrow Hotel Booking</title>

  <!-- Global CSS: used by all pages -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body class="{% block body_class %}{% endblock %}">

  <!-- Header / Main Navigation -->
  <header>
    <h1>Morrow Hotel Booking</h1>

    <nav>
      <!-- Always visible -->
      <a href="/">Home</a>

      {% set user = request.session.get("user") %}

      {% if user %}
        <span class="nav-welcome">Welcome {{ user.user_name or user.email }}</span>
      {% endif %}

      {% if user %}
        <!-- User is logged in -->
        <a href="/my-bookings">My Bookings</a>

        {% if user.is_admin %}
          <!-- Admin-only -->
          <a href="/admin">Admin</a>
        {% endif %}

        <a href="/logout">Logout</a>

      {% else %}
        <!-- User is NOT logged in -->
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      {% endif %}
    </nav>
  </header>

  <!--Page Content Area-->
  <main>
    {% block content %}
    {% endblock %}
  </main>

</body>
</html>
